# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false
reviews:
    profile: "assertive"
    request_changes_workflow: false
    high_level_summary: true
    poem: false
    review_status: true
    review_details: true
    collapse_walkthrough: true
    sequence_diagrams: true
    auto_review:
        enabled: true
        drafts: false
    path_filters:
        - "!vendor/**"
        - "!composer.lock"
    path_instructions:
        - path: "src/**"
          instructions: >
            This is a Laravel adapter package (pocketarc/laravel-integrations-adapters)
            containing provider implementations for pocketarc/laravel-integrations.
            Each subdirectory (e.g. Zendesk/, GitHub/) is a self-contained adapter.
            PHP 8.3+, Laravel 11/12/13. PHPStan level 10 with strict rules. Uses
            proper runtime type validation rather than @var annotations or casts on
            mixed.
    tools:
        gitleaks:
            enabled: true
        trufflehog:
            enabled: true
        shellcheck:
            enabled: true
        yamllint:
            enabled: true
        markdownlint:
            enabled: true
knowledge_base:
    code_guidelines:
        enabled: true
chat:
    auto_reply: true
